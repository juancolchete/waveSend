name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install Dependencies
        # --no-frozen-lockfile is used to handle the Capacitor version mismatches
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js Static Export
        # This will use your tsconfig.json 'exclude' and next.config.ts 'ignoreBuildErrors'
        run: pnpm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        # Checks if android folder exists; if not, adds it, then syncs assets
        run: |
          if [ ! -d "android" ]; then
            pnpm exec cap add android
          fi
          pnpm exec cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveSend-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
