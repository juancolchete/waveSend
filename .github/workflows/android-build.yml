name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Use npm install if you don't have a package-lock.json committed

      - name: Swap Next.js Config for Mobile Export
        # Overwrites next.config.ts with your mobile version for this CI run only
        run: cp next.config.mobile.ts next.config.ts

      - name: Build Next.js Static Export
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Java 17 is standard for modern Android builds

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        run: |
          # Ensure Capacitor CLI and Android platform are installed
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # Initialize Android if the folder doesn't exist yet
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Sync the 'out' folder into the Android project
          npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
