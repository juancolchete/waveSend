name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main 

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js Static Export
        env:
          NEXT_PUBLIC_TWILLIO_NUMBER: ${{ secrets.NEXT_PUBLIC_TWILLIO_NUMBER }}
        run: |
          pnpm run build
          # Verify the folder was created
          ls -d out

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Android & Generate Icons
        run: |
          # 1. Ensure android folder exists
          if [ ! -d "android" ]; then
            pnpm exec cap add android
          fi
          
          # 2. Setup Assets (Icon/Splash)
          mkdir -p assets
          cp public/wavesendlogo.png assets/icon.png
          # Also need a splash if you want a custom one, otherwise it uses default
          cp public/wavesendlogo.png assets/splash.png 
          
          # 3. Generate native assets
          npx @capacitor/assets generate --android
          
          # 4. Sync assets to Android
          pnpm exec cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveSend-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
